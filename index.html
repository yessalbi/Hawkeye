<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYH VISION — 실시간 도시 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyBhzbmzZFQ4gnzQf1Z7Twpb0OoawWXiqBg",
    authDomain: "cyh-hawkeye.firebaseapp.com",
    databaseURL: "https://cyh-hawkeye-default-rtdb.firebaseio.com",
    projectId: "cyh-hawkeye",
    storageBucket: "cyh-hawkeye.firebasestorage.app",
    messagingSenderId: "942927608449",
    appId: "1:942927608449:web:a7179aa28d8fbc9dc56b80"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);

  signInAnonymously(auth).catch(console.error);
  onAuthStateChanged(auth, user => {
    if (!user) return;
    const dot = document.getElementById('fb-dot');
    const lbl = document.getElementById('fb-label');
    if (dot) dot.classList.add('on');
    if (lbl) lbl.textContent = 'DB ✓';

    const favRef = ref(db, `livescope/favorites/${user.uid}`);
    onValue(favRef, snap => {
      window._favs = snap.val() || {};
      document.querySelectorAll('.fav-btn').forEach(btn => {
        const id = btn.dataset.camid;
        btn.textContent = window._favs[id] ? '★' : '☆';
        btn.style.color = window._favs[id] ? '#F6AD55' : '#bbb';
      });
    });

    get(ref(db, `livescope/lastRegion/${user.uid}`)).then(snap => {
      const r = snap.val();
      if (r) { const b = document.querySelector(`.rbtn[data-r="${r}"]`); if(b) b.click(); }
    });

    document.querySelectorAll('.rbtn').forEach(b => {
      b.addEventListener('click', () => set(ref(db, `livescope/lastRegion/${user.uid}`), b.dataset.r));
    });

    window.toggleFav = (e, id, name) => {
      e.stopPropagation();
      const f = {...(window._favs||{})};
      if (f[id]) delete f[id]; else f[id] = {name, at: Date.now()};
      set(ref(db, `livescope/favorites/${user.uid}`), f);
    };
    set(ref(db, `livescope/lastVisit/${user.uid}`), new Date().toISOString());
  });
  window._favs = {};
  window.toggleFav = () => {};
</script>

<style>
:root {
  --bg: #F5F4F0;
  --sur: #FFFFFF;
  --sur2: #EFEDE7;
  --txt: #181816;
  --mut: #87867E;
  --acc: #2C6E49;
  --acl: #EAF4EE;
  --brd: #E2E0D9;
  --live: #E53E3E;
  --r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(245,244,240,0.95);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--brd);
  height: 58px; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 14px; letter-spacing: 0.14em;
  display: flex; align-items: center; gap: 9px;
}
.ldot {
  width: 7px; height: 7px;
  background: var(--live); border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(229,62,62,0.4);
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(229,62,62,0.4); }
  50%  { box-shadow: 0 0 0 6px rgba(229,62,62,0); }
  100% { box-shadow: 0 0 0 0 rgba(229,62,62,0); }
}
.hdr-r { display:flex; align-items:center; gap:12px; }
.live-pill {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.14em;
  color:var(--live); background:rgba(229,62,62,.07);
  border:1px solid rgba(229,62,62,.2); border-radius:100px; padding:3px 9px;
}
.clk { font-family:'DM Mono',monospace; font-size:11px; color:var(--mut); }
.fb-status { display:flex; align-items:center; gap:5px; font-family:'DM Mono',monospace; font-size:10px; color:var(--mut); }
.fb-dot { width:5px; height:5px; border-radius:50%; background:#ccc; transition:background .4s; }
.fb-dot.on { background:var(--acc); }

/* ── NAV TABS ── */
.rnav {
  padding: 16px 24px 0;
  display: flex; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
}
.rnav::-webkit-scrollbar { display:none; }
.rbtn {
  flex-shrink: 0; white-space: nowrap;
  font-size: 12.5px; padding: 7px 16px; border-radius: 100px;
  border: 1.5px solid var(--brd); background: var(--sur); color: var(--mut);
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.rbtn:hover { border-color:var(--acc); color:var(--acc); background:var(--acl); }
.rbtn.on { background:var(--acc); border-color:var(--acc); color:#fff; }
.rcnt { font-family:'DM Mono',monospace; font-size:9px; opacity:.7; }

/* ── SECTIONS ── */
.main { padding: 20px 24px 60px; }
.rblock { display:none; }
.rblock.show { display:block; animation: up .25s ease both; }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.bhead { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; padding-top:2px; }
.btitle { font-size:16px; font-weight:500; }
.bsub { font-family:'DM Mono',monospace; font-size:10px; color:var(--mut); }

/* ── GRID ── */
.cgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
@media(min-width:1500px) { .cgrid { grid-template-columns: repeat(4,1fr); } }
@media(min-width:1100px) and (max-width:1499px) { .cgrid { grid-template-columns: repeat(3,1fr); } }

/* ── CARD ── */
.card {
  background: var(--sur);
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--brd);
  box-shadow: 0 1px 12px rgba(0,0,0,.055);
  transition: box-shadow .2s, transform .2s;
}
.card:hover {
  box-shadow: 0 8px 32px rgba(0,0,0,.11);
  transform: translateY(-2px);
}

/* card header */
.ctop {
  padding: 9px 13px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--brd);
}
.cname { font-size: 12px; font-weight: 500; line-height: 1.2; }
.cloc { font-size: 10px; color: var(--mut); margin-top: 2px; }
.lstatus {
  display:flex; align-items:center; gap:4px;
  font-family:'DM Mono',monospace; font-size:9px; color:var(--live);
  flex-shrink: 0;
}
.ld2 { width:5px; height:5px; background:var(--live); border-radius:50%; animation:pulse 1.8s ease-in-out infinite; }

/* ── VIDEO FRAME ── */
.frame {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  background: #0c0c0c;
  overflow: hidden;
}
.frame iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
}

/* skeleton shimmer while loading */
.frame::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
  background-size: 200% 100%;
  animation: shimmer 1.8s infinite;
  z-index: 0;
}
.frame.loaded::before { display: none; }
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* card footer */
.cfoot {
  padding: 7px 13px;
  background: var(--sur2);
  font-family: 'DM Mono',monospace; font-size: 9.5px; color: var(--mut);
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px;
}
.cfoot-txt { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fav-btn {
  background:none; border:none; cursor:pointer;
  font-size:14px; color:#bbb; padding:0; line-height:1; flex-shrink:0;
  transition:transform .15s, color .15s;
}
.fav-btn:hover { transform:scale(1.3); color:#F6AD55; }

/* ── FOOTER ── */
footer {
  text-align:center; padding:22px;
  font-size:10px; color:var(--mut);
  font-family:'DM Mono',monospace;
  border-top:1px solid var(--brd); letter-spacing:.04em;
}

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  header { padding:0 14px; }
  .rnav { padding:12px 14px 0; }
  .main { padding:14px 14px 50px; }
  .cgrid { grid-template-columns:1fr; gap:10px; }
}
</style>
</head>

<header>
  <div class="logo"><div class="ldot"></div>CYH VISION</div>

  sec.id = 'b-' + reg.id;

// ── 탭 ────────────────────────────────────
document.querySelectorAll('.rbtn').forEach(b => {
  b.addEventListener('click', function() {
    document.querySelectorAll('.rbtn').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
    const r = this.dataset.r;
    REGIONS.forEach(reg => {
      const el = document.getElementById('b-' + reg.id);
      if (el) (r === 'all' || r === reg.id)
        ? el.classList.add('show')
        : el.classList.remove('show');
    });
  });
});

// ── KST 시계 ──────────────────────────────
function tick() {
  const d = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clk').textContent =
    `KST ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick(); setInterval(tick, 1000);
