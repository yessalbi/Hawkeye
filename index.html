<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYH VISION — 실시간 도시 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const app = initializeApp({
    apiKey:"AIzaSyBhzbmzZFQ4gnzQf1Z7Twpb0OoawWXiqBg",
    authDomain:"cyh-hawkeye.firebaseapp.com",
    databaseURL:"https://cyh-hawkeye-default-rtdb.firebaseio.com",
    projectId:"cyh-hawkeye",
    storageBucket:"cyh-hawkeye.firebasestorage.app",
    messagingSenderId:"942927608449",
    appId:"1:942927608449:web:a7179aa28d8fbc9dc56b80"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);
  signInAnonymously(auth).catch(console.error);
  onAuthStateChanged(auth, user => {
    if (!user) return;
    document.getElementById('fb-dot')?.classList.add('on');
    const lbl = document.getElementById('fb-label'); if(lbl) lbl.textContent='DB ✓';
    onValue(ref(db,`livescope/favorites/${user.uid}`), snap => {
      window._favs = snap.val()||{};
      document.querySelectorAll('.fav-btn').forEach(btn => {
        btn.textContent = window._favs[btn.dataset.camid] ? '★':'☆';
        btn.style.color  = window._favs[btn.dataset.camid] ? '#F6AD55':'#bbb';
      });
    });
    get(ref(db,`livescope/lastRegion/${user.uid}`)).then(snap=>{
      const r=snap.val(); if(r){const b=document.querySelector(`.rbtn[data-r="${r}"]`);if(b)b.click();}
    });
    document.querySelectorAll('.rbtn').forEach(b=>{
      b.addEventListener('click',()=>set(ref(db,`livescope/lastRegion/${user.uid}`),b.dataset.r));
    });
    window.toggleFav=(e,id,name)=>{
      e.stopPropagation();
      const f={...(window._favs||{})};
      if(f[id])delete f[id]; else f[id]={name,at:Date.now()};
      set(ref(db,`livescope/favorites/${user.uid}`),f);
    };
    set(ref(db,`livescope/lastVisit/${user.uid}`),new Date().toISOString());
  });
  window._favs={}; window.toggleFav=()=>{};
</script>

<style>
:root{
  --bg:#F5F4F0;--sur:#FFF;--sur2:#EFEDE7;--txt:#181816;--mut:#87867E;
  --acc:#2C6E49;--acl:#EAF4EE;--brd:#E2E0D9;--live:#E53E3E;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

header{
  position:sticky;top:0;z-index:200;
  background:rgba(245,244,240,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--brd);height:58px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:.14em;display:flex;align-items:center;gap:9px}
.ldot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(229,62,62,.4)}50%{box-shadow:0 0 0 7px rgba(229,62,62,0)}100%{box-shadow:0 0 0 0 rgba(229,62,62,0)}}
.hdr-r{display:flex;align-items:center;gap:12px}
.live-pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;color:var(--live);background:rgba(229,62,62,.07);border:1px solid rgba(229,62,62,.2);border-radius:100px;padding:3px 9px}
.clk{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut)}
.fb-status{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.fb-dot{width:5px;height:5px;border-radius:50%;background:#ccc;transition:background .4s}.fb-dot.on{background:var(--acc)}

/* API 배너 */
#api-banner{
  background:#FFFBEB;border-bottom:1px solid #FCD34D;
  padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:12px;color:#92400E;
}
#api-banner.hidden{display:none}
#api-banner input{flex:1;min-width:200px;max-width:320px;padding:5px 10px;border-radius:6px;border:1px solid #FCD34D;background:#FFF;font-family:'DM Mono',monospace;font-size:11px;color:#1a1a1a;outline:none;}
#api-banner input:focus{border-color:#F59E0B}
#api-banner button{padding:5px 14px;border-radius:6px;border:none;background:#F59E0B;color:#fff;font-size:11px;cursor:pointer;white-space:nowrap}
.banner-link{color:#B45309;font-size:10.5px;text-decoration:none;white-space:nowrap}.banner-link:hover{text-decoration:underline}

.rnav{padding:16px 24px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.rnav::-webkit-scrollbar{display:none}
.rbtn{flex-shrink:0;white-space:nowrap;font-size:12.5px;padding:7px 16px;border-radius:100px;border:1.5px solid var(--brd);background:var(--sur);color:var(--mut);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.rbtn:hover{border-color:var(--acc);color:var(--acc);background:var(--acl)}
.rbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}

.main{padding:20px 24px 60px}
.rblock{display:none}
.rblock.show{display:block;animation:up .25s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bhead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-top:4px}
.btitle{font-size:16px;font-weight:500}.bsub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:32px}
@media(min-width:1500px){.cgrid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1100px) and (max-width:1499px){.cgrid{grid-template-columns:repeat(3,1fr)}}

.card{background:var(--sur);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);box-shadow:0 1px 12px rgba(0,0,0,.055);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.11);transform:translateY(-2px)}
.ctop{padding:9px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.cname{font-size:12px;font-weight:500;line-height:1.2}.cloc{font-size:10px;color:var(--mut);margin-top:2px}
.lstatus{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;color:var(--live);flex-shrink:0}
.ld2{width:5px;height:5px;background:var(--live);border-radius:50%;animation:pulse 1.8s ease-in-out infinite}

.frame{position:relative;width:100%;padding-bottom:56.25%;background:#0f0f0f;overflow:hidden}
.frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1}
.shimmer{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,#111 25%,#1c1c1c 50%,#111 75%);background-size:200% 100%;animation:shim 1.6s infinite}
.frame.loaded .shimmer{display:none}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* 에러 오버레이 — iframe 재생 불가 감지 */
.err-overlay{
  position:absolute;inset:0;z-index:3;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:#0f0f0f;
}
.err-overlay.show{display:flex}
.err-icon{font-size:28px;opacity:.35}
.err-msg{font-family:'DM Mono',monospace;font-size:10px;color:#666;text-align:center;line-height:1.8}
.err-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.err-link{font-family:'DM Mono',monospace;font-size:10px;color:#888;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:5px 12px;text-decoration:none;transition:all .2s}
.err-link:hover{background:rgba(255,255,255,.12);color:#ccc}
.err-update{background:none;border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:10px;color:#888;cursor:pointer;transition:all .2s}
.err-update:hover{background:rgba(255,255,255,.08);color:#ccc}

.cfoot{padding:7px 13px;background:var(--sur2);font-family:'DM Mono',monospace;font-size:9.5px;color:var(--mut);display:flex;justify-content:space-between;align-items:center;gap:8px}
.cfoot-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.fav-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#bbb;padding:0;line-height:1;flex-shrink:0;transition:transform .15s,color .15s}
.fav-btn:hover{transform:scale(1.3);color:#F6AD55}

/* VIDEO ID 업데이트 폼 */
.update-form{
  display:none;position:absolute;inset:0;z-index:10;
  background:rgba(10,10,10,.97);flex-direction:column;
  align-items:center;justify-content:center;gap:10px;padding:20px;
}
.update-form.show{display:flex}
.update-form label{font-family:'DM Mono',monospace;font-size:10px;color:#888;text-align:center}
.update-form input{width:100%;max-width:260px;padding:7px 12px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#eee;font-family:'DM Mono',monospace;font-size:12px;text-align:center;outline:none}
.update-form input:focus{border-color:#555}
.update-btns{display:flex;gap:8px}
.update-btns button{padding:6px 16px;border-radius:5px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:none}
.btn-apply{background:#2C6E49;color:#fff}.btn-cancel{background:#2a2a2a;color:#888}

footer{text-align:center;padding:22px;font-size:10px;color:var(--mut);font-family:'DM Mono',monospace;border-top:1px solid var(--brd);letter-spacing:.04em}

@media(max-width:600px){
  header{padding:0 14px}.rnav{padding:12px 14px 0}.main{padding:14px 14px 50px}
  .cgrid{grid-template-columns:1fr;gap:10px}
  #api-banner{padding:10px 14px}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="ldot"></div>CYH VISION</div>
  <div class="hdr-r">
    <div class="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">DB</span></div>
    <div class="live-pill">● LIVE</div>
    <div class="clk" id="clk">--:--:--</div>
  </div>
</header>

<!-- API 배너 (선택) -->
<div id="api-banner">
  <span>⚡ YouTube API Key를 입력하면 채널 최신 라이브를 자동 탐색합니다 (선택사항)</span>
  <input type="password" id="yt-api-input" placeholder="AIzaSy..." onkeydown="if(event.key==='Enter')saveApiKey()">
  <button onclick="saveApiKey()">저장</button>
  <button onclick="document.getElementById('api-banner').classList.add('hidden')" style="background:#ccc;color:#555">닫기</button>
  <a class="banner-link" href="https://console.cloud.google.com/apis/credentials" target="_blank">↗ Key 발급</a>
</div>

<nav class="rnav">
  <button class="rbtn on" data-r="all">🌏 전체</button>
  <button class="rbtn" data-r="seoul">🇰🇷 서울</button>
  <button class="rbtn" data-r="shibuya">🗼 시부야</button>
  <button class="rbtn" data-r="tokyo">🏙️ 도쿄</button>
  <button class="rbtn" data-r="hokkaido">⛄ 홋카이도</button>
</nav>

<main class="main" id="grid"></main>
<footer>CYH VISION &nbsp;·&nbsp; 실시간 도시 뷰어 &nbsp;·&nbsp; 미세먼지 · 날씨 · 일조량을 눈으로 확인</footer>

<script>
// ═══════════════════════════════════════════════════════
//  CAMS — 본인이 직접 확인한 video ID 기준
//  영상이 끊기면 카드 하단 "ID 업데이트" 버튼으로 교체 가능
// ═══════════════════════════════════════════════════════
const CAMS = [
  // ── 서울 ─────────────────────────────────────
  {
    id:'s1', r:'seoul',
    name:'서울 · 한강 라이브캠', loc:'서울',
    vid:'-JhoMGoAfFc',   // ✅ 본인 확인
    ytUrl:'https://www.youtube.com/watch?v=-JhoMGoAfFc',
    desc:'한강 실시간 · 4K'
  },

  // ── 시부야 ────────────────────────────────────
  {
    id:'b1', r:'shibuya',
    name:'시부야 스크램블 크로싱', loc:'도쿄 시부야구',
    vid:'8H3nRCFVR6Y',   // ✅ 본인 확인
    ytUrl:'https://www.youtube.com/watch?v=8H3nRCFVR6Y',
    desc:'スクランブル交差点 · 24h'
  },

  // ── 도쿄 ─────────────────────────────────────
  {
    id:'t1', r:'tokyo',
    name:'도쿄 라이브캠', loc:'도쿄',
    vid:'_k-5U7IeK8g',   // ✅ 본인 확인
    ytUrl:'https://www.youtube.com/watch?v=_k-5U7IeK8g',
    desc:'도쿄 실시간 뷰'
  },

  // ── 홋카이도 ──────────────────────────────────
  {
    id:'h1', r:'hokkaido',
    name:'홋카이도 라이브캠', loc:'홋카이도',
    vid:'kfIQBC0hrII',   // ✅ 본인 확인
    ytUrl:'https://www.youtube.com/watch?v=kfIQBC0hrII',
    desc:'北海道 실시간 뷰'
  }
];

const REGIONS = [
  {id:'seoul',    label:'🇰🇷 서울',    sub:'Seoul, South Korea'},
  {id:'shibuya',  label:'🗼 시부야',    sub:'Shibuya, Tokyo'},
  {id:'tokyo',    label:'🏙️ 도쿄',    sub:'Tokyo, Japan'},
  {id:'hokkaido', label:'⛄ 홋카이도',  sub:'Hokkaido, Japan'}
];

// ── API Key ──────────────────────────────────────────────
let YT_API_KEY = localStorage.getItem('cyhvision_ytkey') || '';
if (YT_API_KEY) {
  document.getElementById('api-banner').classList.add('hidden');
}
function saveApiKey() {
  const v = document.getElementById('yt-api-input').value.trim();
  if (!v) return;
  YT_API_KEY = v;
  localStorage.setItem('cyhvision_ytkey', v);
  document.getElementById('api-banner').classList.add('hidden');
  // API key 저장 시 채널 최신 라이브 탐색 시도
  tryAutoRefreshWithApi();
}

// API key 있으면 채널별 최신 라이브 video ID로 자동 교체
async function tryAutoRefreshWithApi() {
  if (!YT_API_KEY) return;
  // 각 cam의 채널에서 현재 라이브 조회 → vid 업데이트
  for (const cam of CAMS) {
    if (!cam.channelId) continue;
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${cam.channelId}&eventType=live&type=video&maxResults=1&key=${YT_API_KEY}`);
      const data = await res.json();
      if (data.items && data.items.length > 0) {
        const newVid = data.items[0].id.videoId;
        if (newVid !== cam.vid) {
          cam.vid = newVid;
          updateIframe(cam.id, newVid);
        }
      }
    } catch(e) { /* skip */ }
  }
}

// ── 카드 렌더 ───────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  REGIONS.forEach(reg => {
    const cams = CAMS.filter(c => c.r === reg.id);
    const sec = document.createElement('div');
    sec.className = 'rblock show';
    sec.id = 'b-' + reg.id;
    sec.innerHTML = `
      <div class="bhead">
        <span class="btitle">${reg.label}</span>
        <span class="bsub">${reg.sub}</span>
      </div>
      <div class="cgrid">
        ${cams.map(cam => `
          <div class="card" id="card-${cam.id}">
            <div class="ctop">
              <div>
                <div class="cname">${cam.name}</div>
                <div class="cloc">${cam.loc}</div>
              </div>
              <div class="lstatus"><div class="ld2"></div>LIVE</div>
            </div>
            <div class="frame" id="frame-${cam.id}">
              <div class="shimmer"></div>
              <iframe
                id="iframe-${cam.id}"
                src="https://www.youtube.com/embed/${cam.vid}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen
                onload="onIframeLoad('${cam.id}')"
              ></iframe>
              <!-- 재생 불가 시 오버레이 -->
              <div class="err-overlay" id="err-${cam.id}">
                <div class="err-icon">📡</div>
                <div class="err-msg">스트림이 종료되었거나<br>재생할 수 없습니다</div>
                <div class="err-actions">
                  <a class="err-link" href="${cam.ytUrl}" target="_blank">↗ YouTube에서 열기</a>
                  <button class="err-update" onclick="showUpdateForm('${cam.id}')">Video ID 업데이트</button>
                </div>
              </div>
              <!-- Video ID 수동 업데이트 폼 -->
              <div class="update-form" id="upform-${cam.id}">
                <label>새 YouTube Video ID 또는 URL 입력<br><span style="color:#555;font-size:9px">예: youtube.com/watch?v=XXXXXXXXXXX</span></label>
                <input type="text" id="upinput-${cam.id}" placeholder="Video ID or URL" onkeydown="if(event.key==='Enter')applyUpdate('${cam.id}')">
                <div class="update-btns">
                  <button class="btn-apply" onclick="applyUpdate('${cam.id}')">적용</button>
                  <button class="btn-cancel" onclick="hideUpdateForm('${cam.id}')">취소</button>
                </div>
              </div>
            </div>
            <div class="cfoot">
              <span class="cfoot-txt">${cam.desc}</span>
              <button class="fav-btn" data-camid="${cam.id}"
                onclick="window.toggleFav(event,'${cam.id}','${cam.name}')">☆</button>
            </div>
          </div>
        `).join('')}
      </div>`;
    grid.appendChild(sec);
  });
}

// ── iframe 로드 핸들러 ─────────────────────────────────
function onIframeLoad(camId) {
  const frame = document.getElementById('frame-' + camId);
  if (frame) frame.classList.add('loaded');
  // YouTube embed는 재생불가 여부를 JS로 감지할 수 없음
  // 대신 postMessage로 플레이어 상태 수신 시도
}

// ── 수동 Video ID 업데이트 ─────────────────────────────
function showUpdateForm(camId) {
  document.getElementById('err-' + camId)?.classList.remove('show');
  document.getElementById('upform-' + camId)?.classList.add('show');
  document.getElementById('upinput-' + camId)?.focus();
}
function hideUpdateForm(camId) {
  document.getElementById('upform-' + camId)?.classList.remove('show');
  document.getElementById('err-' + camId)?.classList.add('show');
}
function applyUpdate(camId) {
  let val = document.getElementById('upinput-' + camId)?.value.trim();
  if (!val) return;
  // URL이면 video ID 추출
  const match = val.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  if (match) val = match[1];
  if (!/^[A-Za-z0-9_-]{11}$/.test(val)) {
    alert('올바른 YouTube Video ID가 아닙니다 (11자리)');
    return;
  }
  const cam = CAMS.find(c => c.id === camId);
  if (cam) {
    cam.vid = val;
    cam.ytUrl = 'https://www.youtube.com/watch?v=' + val;
  }
  document.getElementById('upform-' + camId)?.classList.remove('show');
  updateIframe(camId, val);
}
function updateIframe(camId, videoId) {
  const frame = document.getElementById('frame-' + camId);
  if (!frame) return;
  frame.classList.remove('loaded');
  document.getElementById('err-' + camId)?.classList.remove('show');
  const iframe = document.getElementById('iframe-' + camId);
  if (iframe) {
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1`;
    iframe.onload = () => frame.classList.add('loaded');
  }
}

// ── 탭 ──────────────────────────────────────────────────
document.querySelectorAll('.rbtn').forEach(b => {
  b.addEventListener('click', function() {
    document.querySelectorAll('.rbtn').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
    const r = this.dataset.r;
    REGIONS.forEach(reg => {
      const el = document.getElementById('b-' + reg.id);
      if (!el) return;
      (r === 'all' || r === reg.id) ? el.classList.add('show') : el.classList.remove('show');
    });
  });
});

// ── KST 시계 ────────────────────────────────────────────
function tick() {
  const d = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clk').textContent = `KST ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick(); setInterval(tick, 1000);

// ── 초기화 ──────────────────────────────────────────────
renderGrid();
if (YT_API_KEY) tryAutoRefreshWithApi();
</script>
</body>
</html>
