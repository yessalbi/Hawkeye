<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYH VISION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const app = initializeApp({
    apiKey:"AIzaSyBhzbmzZFQ4gnzQf1Z7Twpb0OoawWXiqBg",
    authDomain:"cyh-hawkeye.firebaseapp.com",
    databaseURL:"https://cyh-hawkeye-default-rtdb.firebaseio.com",
    projectId:"cyh-hawkeye",storageBucket:"cyh-hawkeye.firebasestorage.app",
    messagingSenderId:"942927608449",appId:"1:942927608449:web:a7179aa28d8fbc9dc56b80"
  });
  const db=getDatabase(app),auth=getAuth(app);
  signInAnonymously(auth).catch(console.error);
  onAuthStateChanged(auth,user=>{
    if(!user)return;
    document.getElementById('fb-dot')?.classList.add('on');
    const lbl=document.getElementById('fb-label');if(lbl)lbl.textContent='DB ✓';
    onValue(ref(db,`livescope/favorites/${user.uid}`),snap=>{
      window._favs=snap.val()||{};
      document.querySelectorAll('.fav-btn').forEach(btn=>{
        btn.textContent=window._favs[btn.dataset.camid]?'★':'☆';
        btn.style.color=window._favs[btn.dataset.camid]?'#F6AD55':'#bbb';
      });
    });
    get(ref(db,`livescope/lastSection/${user.uid}`)).then(snap=>{
      const s=snap.val();
      if(s==='broadcast') switchSection('broadcast');
    });
    window.toggleFav=(e,id,name)=>{
      e.stopPropagation();
      const f={...(window._favs||{})};
      if(f[id])delete f[id];else f[id]={name,at:Date.now()};
      set(ref(db,`livescope/favorites/${user.uid}`),f);
    };
    set(ref(db,`livescope/lastVisit/${user.uid}`),new Date().toISOString());
    window._fbUser=user;
    window._fbDb=db;
  });
  window._favs={};window.toggleFav=()=>{};window._fbUser=null;window._fbDb=null;
</script>

<style>
:root {
  --bg: #F5F4F0; --sur: #FFFFFF; --sur2: #EFEDE8; --sur3: #E8E6E0;
  --txt: #181816; --mut: #87867E; --brd: #E0DED7;
  --acc: #2C6E49; --acl: #EAF4EE; --acc2: #245B3C;
  --live: #E53E3E; --live2: rgba(229,62,62,.08);
  --soop: #6B4EFF; --chzzk: #00C73C;
  --r: 12px; --r2: 8px;
}
* { margin:0; padding:0; box-sizing:border-box }
body { background:var(--bg); color:var(--txt); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden }

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:300;
  background:rgba(245,244,240,.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--brd); height:56px; padding:0 24px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.logo { font-family:'DM Mono',monospace; font-size:13.5px; letter-spacing:.16em; display:flex; align-items:center; gap:8px; flex-shrink:0 }
.ldot { width:6px; height:6px; background:var(--live); border-radius:50%; animation:pulse-r 2s ease-in-out infinite }
@keyframes pulse-r { 0%{box-shadow:0 0 0 0 rgba(229,62,62,.4)} 50%{box-shadow:0 0 0 6px rgba(229,62,62,0)} 100%{box-shadow:0 0 0 0 rgba(229,62,62,0)} }
.hdr-r { display:flex; align-items:center; gap:10px; flex-shrink:0 }
.live-pill { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--live); background:var(--live2); border:1px solid rgba(229,62,62,.22); border-radius:100px; padding:3px 9px }
.clk { font-family:'DM Mono',monospace; font-size:11px; color:var(--mut) }
.fb-status { display:flex; align-items:center; gap:4px; font-family:'DM Mono',monospace; font-size:10px; color:var(--mut) }
.fb-dot { width:5px; height:5px; border-radius:50%; background:#ccc; transition:background .4s } .fb-dot.on { background:var(--acc) }

/* ── SECTION TABS (CCTV / BROADCAST) ── */
.sec-nav {
  padding:14px 24px 0; display:flex; gap:0; border-bottom:1px solid var(--brd);
  background:var(--bg);
}
.sec-btn {
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.06em;
  padding:9px 20px 10px; border:none; background:none; cursor:pointer;
  color:var(--mut); border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color .15s,border-color .15s; white-space:nowrap;
}
.sec-btn:hover { color:var(--txt) }
.sec-btn.on { color:var(--txt); border-bottom-color:var(--txt); font-weight:500 }
.sec-badge {
  display:inline-flex; align-items:center; justify-content:center;
  font-size:8.5px; background:var(--sur3); color:var(--mut);
  border-radius:100px; padding:1px 6px; margin-left:5px; vertical-align:middle;
}
.sec-btn.on .sec-badge { background:var(--acc); color:#fff }

/* ── SECTION CONTENT ── */
.section { display:none }
.section.show { display:block }

/* ── REGION NAV ── */
.rnav { padding:14px 24px 0; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; background:var(--bg) }
.rnav::-webkit-scrollbar { display:none }
.rbtn {
  flex-shrink:0; white-space:nowrap; font-size:12px; padding:6px 15px;
  border-radius:100px; border:1.5px solid var(--brd); background:var(--sur);
  color:var(--mut); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:4px;
}
.rbtn:hover { border-color:var(--acc); color:var(--acc); background:var(--acl) }
.rbtn.on { background:var(--acc); border-color:var(--acc); color:#fff }

/* ── MAIN GRID ── */
.main { padding:18px 24px 60px }
.rblock { display:none }
.rblock.show { display:block; animation:fadeup .2s ease both }
@keyframes fadeup { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.bhead { display:flex; align-items:baseline; gap:9px; margin-bottom:12px; padding-top:4px }
.btitle { font-size:15px; font-weight:500 }
.bsub { font-family:'DM Mono',monospace; font-size:10px; color:var(--mut) }

/* 통합 그리드: 지역 구분 없이 하나의 그리드로 */
#cctv-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
  margin-bottom:24px;
}
@media(min-width:1600px){#cctv-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1200px) and (max-width:1599px){#cctv-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:800px) and (max-width:1199px){#cctv-grid{grid-template-columns:repeat(3,1fr)}}
/* 지역 헤더: 그리드 전체 너비 차지 */
.rgrouphead {
  grid-column:1/-1;
  display:flex; align-items:baseline; gap:8px;
  padding:14px 0 6px; border-bottom:1px solid var(--brd);
  margin-bottom:2px;
}
.rgrouphead:first-child { padding-top:4px }
.rgrouphead-title { font-size:13px; font-weight:500 }
.rgrouphead-sub { font-family:'DM Mono',monospace; font-size:9.5px; color:var(--mut) }
.cgrid { display:contents }

/* ── CCTV CARD ── */
.card { background:var(--sur); border-radius:var(--r); overflow:hidden; border:1px solid var(--brd); box-shadow:0 1px 10px rgba(0,0,0,.05); transition:box-shadow .2s,transform .2s }
.card:hover { box-shadow:0 6px 24px rgba(0,0,0,.10); transform:translateY(-2px) }
.ctop { padding:7px 10px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--brd); gap:8px }
.ctop-left { min-width:0; flex:1 }
.cname { font-size:12px; font-weight:500; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.cloc { font-size:10px; color:var(--mut); margin-top:1px }
.ctop-right { display:flex; align-items:center; gap:6px; flex-shrink:0 }
.edit-btn {
  background:none; border:1px solid var(--brd); border-radius:5px;
  padding:2px 7px; cursor:pointer; font-family:'DM Mono',monospace;
  font-size:9px; color:var(--mut); transition:all .15s; line-height:1.4;
}
.edit-btn:hover { border-color:var(--acc); color:var(--acc); background:var(--acl) }
.lstatus { display:flex; align-items:center; gap:3px; font-family:'DM Mono',monospace; font-size:9px; color:var(--live) }
.ld2 { width:4px; height:4px; background:var(--live); border-radius:50%; animation:pulse-r 1.8s ease-in-out infinite }

.frame { position:relative; width:100%; padding-bottom:56.25%; background:#0d0d0d; overflow:hidden }
.frame iframe { position:absolute; inset:0; width:100%; height:100%; border:none; z-index:1 }
.shimmer { position:absolute; inset:0; z-index:2; background:linear-gradient(90deg,#111 25%,#1c1c1c 50%,#111 75%); background-size:200% 100%; animation:shim 1.6s infinite }
.frame.loaded .shimmer { display:none }
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* edit overlay */
.edit-overlay { display:none; position:absolute; inset:0; z-index:10; background:rgba(6,6,6,.97); flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:18px }
.edit-overlay.show { display:flex }
.edit-overlay label { font-family:'DM Mono',monospace; font-size:10px; color:#777; text-align:center; line-height:1.7 }
.edit-overlay input { width:100%; max-width:270px; padding:8px 11px; border-radius:6px; border:1px solid #252525; background:#141414; color:#eee; font-family:'DM Mono',monospace; font-size:12px; text-align:center; outline:none; transition:border-color .2s }
.edit-overlay input:focus { border-color:#3a3a3a }
.edit-btns { display:flex; gap:7px }
.edit-btns button { padding:6px 16px; border-radius:5px; font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; border:none }
.btn-ok { background:var(--acc); color:#fff } .btn-ok:hover { background:var(--acc2) }
.btn-cx { background:#1e1e1e; color:#777 } .btn-cx:hover { background:#2a2a2a }

.cfoot { padding:5px 10px; background:var(--sur2); font-family:'DM Mono',monospace; font-size:9.5px; color:var(--mut); display:flex; justify-content:space-between; align-items:center; gap:6px }
.cfoot-txt { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1 }
.fav-btn { background:none; border:none; cursor:pointer; font-size:13px; color:#bbb; padding:0; line-height:1; flex-shrink:0; transition:transform .15s,color .15s }
.fav-btn:hover { transform:scale(1.3); color:#F6AD55 }

/* ── BROADCAST SECTION ── */
#section-broadcast .main { padding-top:18px }

.platform-block { margin-bottom:36px }
.platform-header {
  display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:10px;
  border-bottom:1px solid var(--brd);
}
.platform-logo {
  font-family:'DM Mono',monospace; font-size:11px; font-weight:500; letter-spacing:.06em;
  padding:4px 11px; border-radius:5px; color:#fff;
}
.platform-logo.soop { background:var(--soop) }
.platform-logo.chzzk { background:var(--chzzk); color:#003d14 }
.platform-desc { font-size:11.5px; color:var(--mut) }

.bc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:8px }
@media(min-width:1300px){.bc-grid{grid-template-columns:repeat(8,1fr)}}
@media(min-width:1000px) and (max-width:1299px){.bc-grid{grid-template-columns:repeat(6,1fr)}}
@media(min-width:700px) and (max-width:999px){.bc-grid{grid-template-columns:repeat(5,1fr)}}

/* 방송 카드 */
.bc-card {
  background:var(--sur); border:1px solid var(--brd); border-radius:var(--r);
  overflow:hidden; cursor:pointer; transition:box-shadow .2s,transform .2s;
  text-decoration:none; display:block;
}
.bc-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.1); transform:translateY(-2px) }
.bc-card.is-live { border-color:rgba(229,62,62,.3) }
.bc-card.is-live.chzzk-live { border-color:rgba(0,199,60,.3) }
.bc-card.is-live.soop-live { border-color:rgba(107,78,255,.3) }

.bc-thumb {
  position:relative; width:100%; padding-bottom:56.25%; background:#111; overflow:hidden;
}
.bc-thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .3s }
.bc-thumb-placeholder {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#1a1a1a,#111);
  font-size:28px; opacity:.25;
}
.bc-live-badge {
  position:absolute; top:7px; left:7px; z-index:2;
  font-family:'DM Mono',monospace; font-size:8.5px; font-weight:500; letter-spacing:.08em;
  padding:2px 7px; border-radius:4px; color:#fff;
  display:none;
}
.bc-card.is-live .bc-live-badge { display:block }
.bc-live-badge.soop-badge { background:var(--soop) }
.bc-live-badge.chzzk-badge { background:var(--chzzk); color:#003d14 }

.bc-info { padding:7px 9px 8px }
.bc-name { font-size:11px; font-weight:500; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.bc-platform-tag { font-family:'DM Mono',monospace; font-size:9px; color:var(--mut); margin-top:2px }
.bc-title {
  font-size:10px; color:var(--mut); margin-top:4px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  line-height:1.4; min-height:29px;
}
.bc-title.live-now { color:var(--txt) }
.bc-status {
  margin-top:6px; display:flex; align-items:center; gap:4px;
  font-family:'DM Mono',monospace; font-size:9px;
}
.bc-status-dot { width:5px; height:5px; border-radius:50%; background:#ccc; flex-shrink:0 }
.bc-status.on .bc-status-dot { background:var(--live); animation:pulse-r 1.8s ease-in-out infinite }
.bc-status.on .bc-status-txt { color:var(--live) }
.bc-status-txt { color:var(--mut) }
.bc-viewers { font-family:'DM Mono',monospace; font-size:9px; color:var(--mut); margin-left:auto }

/* 로딩 스켈레톤 */
.bc-skeleton {
  background:var(--sur); border:1px solid var(--brd); border-radius:var(--r); overflow:hidden;
}
.bc-skel-thumb { width:100%; padding-bottom:56.25%; background:var(--sur3); animation:skelshim 1.5s ease infinite; background-size:200% 100%; background-image:linear-gradient(90deg,var(--sur3) 25%,var(--sur2) 50%,var(--sur3) 75%) }
@keyframes skelshim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.bc-skel-info { padding:9px 10px }
.bc-skel-line { height:10px; background:var(--sur3); border-radius:3px; margin-bottom:6px; animation:skelshim 1.5s ease infinite; background-size:200% 100%; background-image:linear-gradient(90deg,var(--sur3) 25%,var(--sur2) 50%,var(--sur3) 75%) }

footer { text-align:center; padding:20px; font-size:10px; color:var(--mut); font-family:'DM Mono',monospace; border-top:1px solid var(--brd); letter-spacing:.04em }

@media(max-width:600px) {
  header { padding:0 14px; height:52px } .clk{display:none}
  .sec-nav { padding:12px 14px 0 }
  .rnav { padding:10px 14px 0 }
  .main { padding:12px 14px 50px }
  #cctv-grid { grid-template-columns:1fr; gap:8px }
  .bc-grid { grid-template-columns:repeat(2,1fr); gap:8px }
}

/* ── SPLASH ─────────────────────────────────── */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:#F5F4F0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.hidden { opacity:0; visibility:hidden; pointer-events:none }

.splash-inner {
  display:flex; flex-direction:column; align-items:center; gap:0;
  width:320px;
}

.splash-logo {
  font-family:'DM Mono',monospace; font-size:22px; letter-spacing:.2em;
  color:#181816; display:flex; align-items:center; gap:10px;
  margin-bottom:10px;
}
.splash-dot {
  width:8px; height:8px; border-radius:50%; background:#E53E3E;
  box-shadow:0 0 12px rgba(229,62,62,.8);
  animation:pulse-r 1.5s ease-in-out infinite;
}
.splash-tagline {
  font-family:'DM Mono',monospace; font-size:10px; color:#87867E;
  letter-spacing:.08em; margin-bottom:40px;
}

.splash-tasks { width:100%; display:flex; flex-direction:column; gap:12px; margin-bottom:28px }
.splash-task {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; border-radius:8px;
  background:#FFFFFF; border:1px solid #E0DED7;
  transition:border-color .3s, background .3s;
}
.splash-task.done { border-color:#2C6E49; background:#EAF4EE }
.splash-task.done .task-spinner { display:none }
.splash-task.done::before {
  content:'✓'; width:16px; height:16px; font-size:11px; color:#2C6E49;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.splash-task.err { border-color:#F5C6C6; background:#FEF2F2 }
.splash-task.err .task-spinner { display:none }
.splash-task.err::before {
  content:'✕'; width:16px; height:16px; font-size:11px; color:#E53E3E;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}

.task-spinner {
  width:16px; height:16px; border-radius:50%; flex-shrink:0;
  border:2px solid #E0DED7; border-top-color:#87867E;
  animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

.task-label { font-family:'DM Mono',monospace; font-size:11px; color:#87867E; flex:1 }
.task-status { font-family:'DM Mono',monospace; font-size:10px; color:#bbb }
.splash-task.done .task-status { color:#2C6E49 }
.splash-task.err .task-status { color:#E53E3E }

.splash-bar-wrap {
  width:100%; height:2px; background:#E0DED7; border-radius:2px; overflow:hidden;
}
.splash-bar {
  height:100%; width:0%; background:linear-gradient(90deg,#2C6E49,#52b788);
  border-radius:2px; transition:width .4s ease;
}

</style>
</head>
<body>

<!-- ════════════ LOADING SCREEN ════════════ -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <div class="splash-dot"></div>
      <span>CYH VISION</span>
    </div>
    <div class="splash-tagline">실시간 도시 뷰어 · 방송 대시보드</div>
    <div class="splash-tasks">
      <div class="splash-task" id="task-firebase">
        <div class="task-spinner"></div>
        <span class="task-label">Firebase 연결</span>
        <span class="task-status">대기중</span>
      </div>
      <div class="splash-task" id="task-cctv">
        <div class="task-spinner"></div>
        <span class="task-label">CCTV 채널 로드</span>
        <span class="task-status">대기중</span>
      </div>
      <div class="splash-task" id="task-broadcast">
        <div class="task-spinner"></div>
        <span class="task-label">방송 상태 조회</span>
        <span class="task-status">대기중</span>
      </div>
    </div>
    <div class="splash-bar-wrap"><div class="splash-bar" id="splash-bar"></div></div>
  </div>
</div>

<header>
  <div class="logo"><div class="ldot"></div>CYH VISION</div>
  <div class="hdr-r">
    <div class="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">DB</span></div>
    <div class="live-pill">● LIVE</div>
    <div class="clk" id="clk">--:--:--</div>
  </div>
</header>

<!-- 섹션 탭 -->
<nav class="sec-nav">
  <button class="sec-btn on" data-sec="cctv" onclick="switchSection('cctv')">
    CCTV <span class="sec-badge">13</span>
  </button>
  <button class="sec-btn" data-sec="broadcast" onclick="switchSection('broadcast')">
    BROADCAST <span class="sec-badge" id="bc-live-cnt">—</span>
  </button>
</nav>

<!-- ════════════ CCTV 섹션 ════════════ -->
<div id="section-cctv" class="section show">
  <nav class="rnav">
    <button class="rbtn on" data-r="all">🌏 전체</button>
    <button class="rbtn" data-r="seoul">🇰🇷 서울</button>
    <button class="rbtn" data-r="tokyo">🏙️ 도쿄</button>
    <button class="rbtn" data-r="shibuya">🗼 시부야</button>
    <button class="rbtn" data-r="hokkaido">⛄ 홋카이도</button>
    <button class="rbtn" data-r="osaka">🏮 오사카</button>
    <button class="rbtn" data-r="kyoto">⛩️ 교토</button>
    <button class="rbtn" data-r="fuji">🗻 후지산</button>
    <button class="rbtn" data-r="okinawa">🌊 오키나와</button>
  </nav>

  if(!/^[A-Za-z0-9_-]{11}$/.test(v)){alert('올바른 YouTube Video ID가 아닙니다');return;}

function renderBcCard(streamer, isLive, data, platform) {

  const thumbUrl = isLive && rawThumb
    ? (platform === 'chzzk' ? rawThumb.replace('{type}', '480') : rawThumb)
    : null;

  const liveClass = isLive ? `is-live ${platform}-live` : '';
  const badgeClass = platform === 'soop' ? 'soop-badge' : 'chzzk-badge';
  // viewers: CHZZK=concurrentUserCount, SOOP=concurrentUserCount(래핑)
  const viewers = isLive && data?.concurrentUserCount
    ? fmtNum(data.concurrentUserCount) : null;
  const title = isLive && (data?.liveTitle || data?.title)
    ? (data.liveTitle || data.title) : null;

  el.outerHTML = `

      <div class="bc-thumb">

          ? `<img src="${thumbUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`

function fmtNum(n){
  if(n>=10000)return (n/10000).toFixed(1)+'만';
  if(n>=1000)return (n/1000).toFixed(1)+'K';
  return String(n);
}

// ── SOOP 상태 조회 ──────────────────────────────
async function fetchSoop(soopId) {
  try {
    const res = await fetch(`${PROXY}/soop?id=${soopId}`, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    console.log(`[SOOP] ${soopId}:`, JSON.stringify(json).slice(0, 200));
    // station_status_plus 응답: { data: { is_live:1, broad_no, broad_title, current_sum_viewer } }
    const d = json?.data ?? json?.DATA ?? null;
    const isLive = d?.is_live === 1 || d?.is_live === '1';
    if (isLive) {
      const bno = d?.broad_no ?? null;
      return {
        isLive: true,
        thumb: bno ? `https://liveimg.sooplive.co.kr/m/${bno}` : null,
        title: d?.broad_title ?? null,
        viewers: d?.current_sum_viewer ? parseInt(d.current_sum_viewer) : null,
      };
    }
    return { isLive: false, thumb: null, title: null, viewers: null };
  } catch(e) {
    console.error(`[SOOP] ${soopId}:`, e.message);
    return { isLive: false, thumb: null, title: null, viewers: null };
  }
}

async function loadSoopStatus() {
  const results = await Promise.allSettled(
    SOOP_STREAMERS.map(async s => ({ s, ...(await fetchSoop(s.soopId)) }))
  );
  let liveCount = 0;
  results.forEach(r => {
    if (r.status !== 'fulfilled') return;
    const { s, isLive, thumb, title, viewers } = r.value;
    if (isLive) liveCount++;
    renderBcCard(s, isLive, { liveImageUrl: thumb, liveTitle: title, concurrentUserCount: viewers }, 'soop');
  });
  return liveCount;
}

// ── 치지직 상태 조회 ─────────────────────────────
async function fetchChzzk(chzzkId) {

    const res = await fetch(`${PROXY}/chzzk?id=${chzzkId}`, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    console.log(`[CHZZK] ${chzzkId.slice(0,8)}:`, JSON.stringify(json).slice(0, 150));
    return json?.content ?? null;
  } catch(e) {
    console.error(`[CHZZK] ${chzzkId.slice(0,8)}:`, e.message);
    return null;
  }
}

async function loadChzzkStatus() {
  let liveCount = 0;
  const results = await Promise.allSettled(
    CHZZK_STREAMERS.map(async s => {
      const content = await fetchChzzk(s.chzzkId);
      return { s, isLive: content?.status === 'OPEN', data: content };
    })
  );
  results.forEach(r => {
    if (r.status !== 'fulfilled') return;
    const { s, isLive, data } = r.value;
    if (isLive) liveCount++;
    renderBcCard(s, isLive, data, 'chzzk');
  });
  return liveCount;
}
async function loadAllBroadcastStatus() {
  const [soopLive, chzzkLive] = await Promise.all([loadSoopStatus(), loadChzzkStatus()]);
  const total = soopLive + chzzkLive;
  const badge = document.getElementById('bc-live-cnt');
  if (badge) badge.textContent = total > 0 ? `${total} LIVE` : '—';
}

// ═══════════════════════════════════════════════════
//  KST 시계
// ═══════════════════════════════════════════════════
function tick(){
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=`KST ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick();setInterval(tick,1000);

// ═══════════════════════════════════════════════════
//  로딩 화면 + 초기화
// ═══════════════════════════════════════════════════
function splashTask(id, status, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'splash-task ' + status;
  el.querySelector('.task-status').textContent = text;
}
function splashProgress(pct) {
  const bar = document.getElementById('splash-bar');
  if (bar) bar.style.width = pct + '%';
}
function hideSplash() {
  const s = document.getElementById('splash');
  if (s) s.classList.add('hidden');
  setTimeout(() => { if (s) s.remove(); }, 600);
}

async function init() {
  // ── Firebase ───────────────────────
  splashTask('task-firebase', '', '연결 중...');
  splashProgress(10);
  await new Promise(resolve => {
    // Firebase auth 상태 변화 대기 (최대 4초)
    let done = false;
    const unsub = window._onFbReady ? window._onFbReady(resolve) : null;
    // fallback: 이미 연결됐거나 4초 초과
    const check = setInterval(() => {
      if (window._fbUser !== null || window._fbUser === undefined) {
        clearInterval(check);
        if (!done) { done = true; resolve(); }
      }
    }, 100);
    setTimeout(() => { clearInterval(check); if (!done) { done = true; resolve(); } }, 4000);
  });
  if (window._fbUser) {
    splashTask('task-firebase', 'done', '연결됨');
  } else {
    splashTask('task-firebase', 'err', '오프라인');
  }
  splashProgress(33);

  // ── CCTV ───────────────────────────
  splashTask('task-cctv', '', '로드 중...');
  await new Promise(r => setTimeout(r, 0));
  renderCCTV();
  window._bcLoaded = false;
  // hash 복원
  const hash = location.hash.replace('#','');
  if (hash === 'broadcast') switchSection('broadcast', true);
  splashTask('task-cctv', 'done', '완료 (' + (window._CAMS_COUNT || 11) + '개)');
  splashProgress(55);

  // ── Broadcast ─────────────────────
  splashTask('task-broadcast', '', '조회 중...');
  renderBroadcast();
  window._bcLoaded = true;
  let liveTotal = 0;
  try {
    const [s, c] = await Promise.all([loadSoopStatus(), loadChzzkStatus()]);
    liveTotal = s + c;
    const badge = document.getElementById('bc-live-cnt');
    if (badge) badge.textContent = liveTotal > 0 ? (liveTotal + ' LIVE') : '—';
    splashTask('task-broadcast', 'done', liveTotal > 0 ? (liveTotal + '명 방송중') : '방송 없음');
  } catch(e) {
    splashTask('task-broadcast', 'err', '조회 실패');
  }
  splashProgress(100);

  // ── 완료 → 메인 표시 ──────────────
  await new Promise(r => setTimeout(r, 600));
  hideSplash();
}

init();
</script>
