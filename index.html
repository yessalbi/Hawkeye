<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const app = initializeApp({
    apiKey:"AIzaSyBhzbmzZFQ4gnzQf1Z7Twpb0OoawWXiqBg",
    authDomain:"cyh-hawkeye.firebaseapp.com",
    databaseURL:"https://cyh-hawkeye-default-rtdb.firebaseio.com",
    projectId:"cyh-hawkeye",
    storageBucket:"cyh-hawkeye.firebasestorage.app",
    messagingSenderId:"942927608449",
    appId:"1:942927608449:web:a7179aa28d8fbc9dc56b80"
  });
  const db = getDatabase(app);
  const auth = getAuth(app);
  signInAnonymously(auth).catch(console.error);
  onAuthStateChanged(auth, user => {
    if (!user) return;
    const dot = document.getElementById('fb-dot');
    const lbl = document.getElementById('fb-label');
    if (dot) dot.classList.add('on');
    if (lbl) lbl.textContent = 'DB ✓';
    onValue(ref(db,`livescope/favorites/${user.uid}`), snap => {
      window._favs = snap.val()||{};
      document.querySelectorAll('.fav-btn').forEach(btn => {
        const id = btn.dataset.camid;
        btn.textContent = window._favs[id] ? '★':'☆';
        btn.style.color = window._favs[id] ? '#F6AD55':'#bbb';
      });
    });
    get(ref(db,`livescope/lastRegion/${user.uid}`)).then(snap => {
      const r = snap.val();
      if (r) { const b=document.querySelector(`.rbtn[data-r="${r}"]`); if(b) b.click(); }
    });
    document.querySelectorAll('.rbtn').forEach(b => {
      b.addEventListener('click', () => set(ref(db,`livescope/lastRegion/${user.uid}`), b.dataset.r));
    });
    window.toggleFav = (e,id,name) => {
      e.stopPropagation();
      const f={...(window._favs||{})};
      if(f[id]) delete f[id]; else f[id]={name,at:Date.now()};
      set(ref(db,`livescope/favorites/${user.uid}`),f);
    };
    set(ref(db,`livescope/lastVisit/${user.uid}`), new Date().toISOString());
  });
  window._favs={};
  window.toggleFav=()=>{};
</script>

<style>

.clk{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut)}
.fb-status{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.fb-dot{width:5px;height:5px;border-radius:50%;background:#ccc;transition:background .4s}
.fb-dot.on{background:var(--acc)}

.main{padding:20px 24px 60px}

// ── YouTube API Key 관리 ──────────────────────────
let YT_API_KEY = localStorage.getItem('cyhvision_ytkey') || '';

function saveApiKey() {
  const val = document.getElementById('yt-api-input').value.trim();
  if (!val) return;
  YT_API_KEY = val;
  localStorage.setItem('cyhvision_ytkey', val);
  document.getElementById('api-banner').classList.add('hidden');
  loadAllLiveVideos();
}

if (YT_API_KEY) {
  document.getElementById('api-banner').classList.add('hidden');
  document.getElementById('yt-api-input').value = YT_API_KEY;
}

// ── 채널별 현재 라이브 video ID 조회 ────────────────
async function getLiveVideoId(channelId) {
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&maxResults=1&key=${YT_API_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    if (data.items && data.items.length > 0) {
      return {
        videoId: data.items[0].id.videoId,
        title: data.items[0].snippet.title
      };
    }
    return null; // 현재 라이브 없음
  } catch(e) {
    console.warn(`[${channelId}] API 오류:`, e.message);
    return null;
  }
}

// ── 카드 렌더링 ──────────────────────────────────
function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  REGIONS.forEach(reg => {
    const cams = CAMS.filter(c => c.r === reg.id);
    const sec = document.createElement('div');
    sec.className = 'rblock show';
    sec.id = 'b-' + reg.id;
    sec.innerHTML = `
      <div class="bhead">
        <span class="btitle">${reg.label}</span>
        <span class="bsub">${reg.sub}</span>
      </div>
      <div class="cgrid">
        ${cams.map(c => `
          <div class="card" id="card-${c.id}">
            <div class="ctop">
              <div>
                <div class="cname">${c.name}</div>
                <div class="cloc">${c.loc}</div>
              </div>
              <div class="lstatus"><div class="ld2"></div>LIVE</div>
            </div>
            <div class="frame" id="frame-${c.id}">
              <div class="shimmer"></div>
              <div class="err-overlay" id="err-${c.id}">
                <div class="err-icon">📡</div>
                <div class="err-txt" id="errtxt-${c.id}">라이브 탐색 중...</div>
                <a class="err-btn" href="https://www.youtube.com/channel/${c.channelId}/live" target="_blank">↗ YouTube에서 열기</a>
              </div>
              <button class="reload-btn" onclick="reloadCam('${c.id}','${c.channelId}')">↺ 새로고침</button>
            </div>
            <div class="cfoot">
              <span class="cfoot-txt">${c.desc}</span>
              <button class="fav-btn" data-camid="${c.id}" onclick="window.toggleFav(event,'${c.id}','${c.name}')">☆</button>
            </div>
          </div>
        `).join('')}
      </div>`;
    grid.appendChild(sec);
  });
}

  const frame = document.getElementById('frame-' + camId);
  if (!frame) return;
  // 기존 iframe 제거
  frame.querySelectorAll('iframe').forEach(el => el.remove());
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1`;
  iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
  iframe.allowFullscreen = true;
  iframe.onload = () => frame.classList.add('loaded');
  frame.appendChild(iframe);
  // 에러 오버레이 숨기기
  const err = document.getElementById('err-' + camId);
  if (err) err.classList.remove('show');
}

// ── 에러 표시 ────────────────────────────────────
function showError(camId, msg) {
  const frame = document.getElementById('frame-' + camId);
  if (frame) frame.classList.add('loaded'); // shimmer 제거
  const err = document.getElementById('err-' + camId);
  const txt = document.getElementById('errtxt-' + camId);
  if (err) err.classList.add('show');
  if (txt) txt.textContent = msg;
}

// ── 개별 카메라 로드 ─────────────────────────────
async function loadCam(cam) {
  if (!YT_API_KEY) {
    showError(cam.id, 'API Key 필요\n(상단 배너에서 입력)');
    return;
  }
  const result = await getLiveVideoId(cam.channelId);
  if (result) {
    injectIframe(cam.id, result.videoId);
  } else {
    showError(cam.id, '현재 라이브 방송 없음\n채널을 직접 확인해 주세요');
  }
}

// ── 새로고침 ─────────────────────────────────────
async function reloadCam(camId, channelId) {
  const cam = CAMS.find(c => c.id === camId);
  if (!cam) return;
  const frame = document.getElementById('frame-' + camId);
  if (frame) frame.classList.remove('loaded');
  const err = document.getElementById('err-' + camId);
  if (err) err.classList.remove('show');
  const txt = document.getElementById('errtxt-' + camId);
  if (txt) txt.textContent = '다시 탐색 중...';
  await loadCam(cam);
}

// ── 전체 로드 ────────────────────────────────────
async function loadAllLiveVideos() {
  // API 쿼터 절약: 병렬로 최대 3개씩 배치 처리
  const batchSize = 3;
  for (let i = 0; i < CAMS.length; i += batchSize) {
    const batch = CAMS.slice(i, i + batchSize);
    await Promise.all(batch.map(c => loadCam(c)));
    if (i + batchSize < CAMS.length) {
      await new Promise(r => setTimeout(r, 300)); // API rate limit 방지
    }
  }
}

// ── 탭 전환 ──────────────────────────────────────
document.querySelectorAll('.rbtn').forEach(b => {
  b.addEventListener('click', function() {
    document.querySelectorAll('.rbtn').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
    const r = this.dataset.r;
    REGIONS.forEach(reg => {
      const el = document.getElementById('b-' + reg.id);
      if (el) (r==='all'||r===reg.id) ? el.classList.add('show') : el.classList.remove('show');
    });
  });
});

// ── KST 시계 ─────────────────────────────────────
function tick() {
  const d = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clk').textContent = `KST ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick(); setInterval(tick, 1000);

// ── 초기화 ───────────────────────────────────────
renderCards();
if (YT_API_KEY) {
  loadAllLiveVideos();
} else {
  // API key 없을 때 모든 카드에 안내 표시
  CAMS.forEach(c => showError(c.id, 'YouTube API Key를 입력해 주세요'));
}
</script>
