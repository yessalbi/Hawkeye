<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYH VISION — 실시간 도시 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const app = initializeApp({
    apiKey:"AIzaSyBhzbmzZFQ4gnzQf1Z7Twpb0OoawWXiqBg",
    authDomain:"cyh-hawkeye.firebaseapp.com",
    databaseURL:"https://cyh-hawkeye-default-rtdb.firebaseio.com",
    projectId:"cyh-hawkeye",storageBucket:"cyh-hawkeye.firebasestorage.app",
    messagingSenderId:"942927608449",appId:"1:942927608449:web:a7179aa28d8fbc9dc56b80"
  });
  const db=getDatabase(app), auth=getAuth(app);
  signInAnonymously(auth).catch(console.error);
  onAuthStateChanged(auth,user=>{
    if(!user)return;
    document.getElementById('fb-dot')?.classList.add('on');
    const lbl=document.getElementById('fb-label');if(lbl)lbl.textContent='DB ✓';
    onValue(ref(db,`livescope/favorites/${user.uid}`),snap=>{
      window._favs=snap.val()||{};
      document.querySelectorAll('.fav-btn').forEach(btn=>{
        btn.textContent=window._favs[btn.dataset.camid]?'★':'☆';
        btn.style.color=window._favs[btn.dataset.camid]?'#F6AD55':'#bbb';
      });
    });
    get(ref(db,`livescope/lastRegion/${user.uid}`)).then(snap=>{
      const r=snap.val();if(r){const b=document.querySelector(`.rbtn[data-r="${r}"]`);if(b)b.click();}
    });
    document.querySelectorAll('.rbtn').forEach(b=>b.addEventListener('click',()=>set(ref(db,`livescope/lastRegion/${user.uid}`),b.dataset.r)));
    window.toggleFav=(e,id,name)=>{
      e.stopPropagation();
      const f={...(window._favs||{})};
      if(f[id])delete f[id];else f[id]={name,at:Date.now()};
      set(ref(db,`livescope/favorites/${user.uid}`),f);
    };
    set(ref(db,`livescope/lastVisit/${user.uid}`),new Date().toISOString());
  });
  window._favs={};window.toggleFav=()=>{};
</script>

<style>
:root{
  --bg:#F5F4F0;--sur:#FFF;--sur2:#EFEDE7;--txt:#181816;--mut:#87867E;
  --acc:#2C6E49;--acl:#EAF4EE;--brd:#E2E0D9;--live:#E53E3E;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

header{
  position:sticky;top:0;z-index:200;
  background:rgba(245,244,240,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--brd);height:58px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.logo{font-family:'DM Mono',monospace;font-size:14px;letter-spacing:.14em;display:flex;align-items:center;gap:9px;flex-shrink:0}
.ldot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse-r 2s ease-in-out infinite}
@keyframes pulse-r{0%{box-shadow:0 0 0 0 rgba(229,62,62,.4)}50%{box-shadow:0 0 0 7px rgba(229,62,62,0)}100%{box-shadow:0 0 0 0 rgba(229,62,62,0)}}
.hdr-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--live);background:rgba(229,62,62,.07);border:1px solid rgba(229,62,62,.2);border-radius:100px;padding:3px 9px;white-space:nowrap}
.clk{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);white-space:nowrap}
.fb-status{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}
.fb-dot{width:5px;height:5px;border-radius:50%;background:#ccc;transition:background .4s}.fb-dot.on{background:var(--acc)}

.rnav{padding:14px 24px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.rnav::-webkit-scrollbar{display:none}
.rbtn{flex-shrink:0;white-space:nowrap;font-size:12.5px;padding:7px 16px;border-radius:100px;border:1.5px solid var(--brd);background:var(--sur);color:var(--mut);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.rbtn:hover{border-color:var(--acc);color:var(--acc);background:var(--acl)}
.rbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}

.main{padding:18px 24px 60px}
.rblock{display:none}
.rblock.show{display:block;animation:fadeup .22s ease both}
@keyframes fadeup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.bhead{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}
.btitle{font-size:15px;font-weight:500}.bsub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut)}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px;margin-bottom:28px}
@media(min-width:1500px){.cgrid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1100px) and (max-width:1499px){.cgrid{grid-template-columns:repeat(3,1fr)}}

.card{background:var(--sur);border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);box-shadow:0 1px 10px rgba(0,0,0,.05);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 6px 28px rgba(0,0,0,.1);transform:translateY(-2px)}

/* 카드 헤더 */
.ctop{padding:9px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);gap:8px}
.ctop-left{min-width:0;flex:1}
.cname{font-size:12px;font-weight:500;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cloc{font-size:10px;color:var(--mut);margin-top:1px}
.ctop-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* URL 수정 버튼 */
.edit-btn{
  background:none;border:1px solid var(--brd);border-radius:5px;
  padding:3px 7px;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);
  transition:all .15s;white-space:nowrap;line-height:1;
}
.edit-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acl)}

.lstatus{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:9px;color:var(--live)}
.ld2{width:5px;height:5px;background:var(--live);border-radius:50%;animation:pulse-r 1.8s ease-in-out infinite}

/* 영상 프레임 */
.frame{position:relative;width:100%;padding-bottom:56.25%;background:#0d0d0d;overflow:hidden}
.frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1}
.shimmer{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,#111 25%,#1c1c1c 50%,#111 75%);background-size:200% 100%;animation:shim 1.6s infinite}
.frame.loaded .shimmer{display:none}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* URL 편집 오버레이 */
.edit-overlay{
  display:none;position:absolute;inset:0;z-index:10;
  background:rgba(8,8,8,.97);
  flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;
}
.edit-overlay.show{display:flex}
.edit-overlay label{font-family:'DM Mono',monospace;font-size:10px;color:#777;text-align:center;line-height:1.7}
.edit-overlay input{
  width:100%;max-width:280px;padding:8px 12px;border-radius:7px;
  border:1px solid #2a2a2a;background:#161616;
  color:#eee;font-family:'DM Mono',monospace;font-size:12px;text-align:center;outline:none;
  transition:border-color .2s;
}
.edit-overlay input:focus{border-color:#444}
.edit-btns{display:flex;gap:8px}
.edit-btns button{padding:7px 18px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:none;transition:opacity .15s}
.btn-ok{background:var(--acc);color:#fff}.btn-ok:hover{opacity:.85}
.btn-cx{background:#222;color:#777}.btn-cx:hover{background:#2a2a2a}

.cfoot{padding:7px 12px;background:var(--sur2);font-family:'DM Mono',monospace;font-size:9.5px;color:var(--mut);display:flex;justify-content:space-between;align-items:center;gap:6px}
.cfoot-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.fav-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#bbb;padding:0;line-height:1;flex-shrink:0;transition:transform .15s,color .15s}
.fav-btn:hover{transform:scale(1.3);color:#F6AD55}

footer{text-align:center;padding:20px;font-size:10px;color:var(--mut);font-family:'DM Mono',monospace;border-top:1px solid var(--brd);letter-spacing:.04em}

@media(max-width:600px){
  header{padding:0 14px;height:52px}
  .clk{display:none}
  .rnav{padding:10px 14px 0}
  .main{padding:12px 14px 50px}
  .cgrid{grid-template-columns:1fr;gap:10px}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="ldot"></div>CYH VISION</div>
  <div class="hdr-r">
    <div class="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">DB</span></div>
    <div class="live-pill">● LIVE</div>
    <div class="clk" id="clk">--:--:--</div>
  </div>
</header>

<nav class="rnav">
  <button class="rbtn on" data-r="all">🌏 전체</button>
  <button class="rbtn" data-r="seoul">🇰🇷 서울</button>
  <button class="rbtn" data-r="shibuya">🗼 시부야</button>
  <button class="rbtn" data-r="tokyo">🏙️ 도쿄</button>
  <button class="rbtn" data-r="hokkaido">⛄ 홋카이도</button>
</nav>

<main class="main" id="grid"></main>
<footer>CYH VISION &nbsp;·&nbsp; 실시간 도시 뷰어 &nbsp;·&nbsp; 미세먼지 · 날씨 · 일조량을 눈으로 확인</footer>

<script>
// ══════════════════════════════════════════════════════
//  CAMS — sakuralivecams.com 검증 + 본인 직접 확인 ID만 수록
//  ✅ = sakuralivecams.com 썸네일로 검증된 ID
//  👤 = 본인이 직접 라이브 확인
// ══════════════════════════════════════════════════════
const CAMS = [
  // ── 서울 ─────────────────────────────────────────────
  {id:'s1',r:'seoul',
   name:'한강 · 서울',loc:'서울',
   vid:'-JhoMGoAfFc', // 👤
   desc:'한강 실시간 4K 라이브캠'},

  // ── 시부야 ────────────────────────────────────────────
  {id:'b1',r:'shibuya',
   name:'시부야 스크램블 크로싱',loc:'도쿄 시부야구',
   vid:'8H3nRCFVR6Y', // 👤✅
   desc:'スクランブル交差点 · 24h'},
  {id:'b2',r:'shibuya',
   name:'시부야 크로싱 (앵글2)',loc:'도쿄 시부야구',
   vid:'tujkoXI8rWM', // ✅ sakuralivecams
   desc:'Shibuya Crossing · 다른 앵글'},
  {id:'b3',r:'shibuya',
   name:'시부야 거리 뷰',loc:'도쿄 시부야구',
   vid:'f50R4vDlCmA', // ✅ sakuralivecams
   desc:'Tokyo Shibuya · 도심 거리'},

  // ── 도쿄 ─────────────────────────────────────────────
  {id:'t1',r:'tokyo',
   name:'도쿄 스카이라인',loc:'도쿄',
   vid:'_k-5U7IeK8g', // 👤✅
   desc:'Tokyo Skyline · 파노라마'},
  {id:'t2',r:'tokyo',
   name:'신주쿠',loc:'도쿄 신주쿠구',
   vid:'6dp-bvQ7RWo', // ✅ sakuralivecams
   desc:'Shinjuku · 네온 도심'},
  {id:'t3',r:'tokyo',
   name:'가부키초',loc:'도쿄 신주쿠구',
   vid:'gFRtAAmiFbE', // ✅ sakuralivecams
   desc:'歌舞伎町 · 가부키초 24h'},
  {id:'t4',r:'tokyo',
   name:'도쿄타워 & 철도',loc:'도쿄 미나토구',
   vid:'EmXsW-g6Ni8', // ✅ sakuralivecams
   desc:'Tokyo Tower · 철도 뷰'},
  {id:'t5',r:'tokyo',
   name:'센소지 · 아사쿠사',loc:'도쿄 다이토구',
   vid:'HjRZNBm1kms', // ✅ sakuralivecams
   desc:'浅草寺 · 가미나리몬'},

  // ── 홋카이도 ──────────────────────────────────────────
  {id:'h1',r:'hokkaido',
   name:'삿포로역',loc:'홋카이도 삿포로시',
   vid:'O7aL3u5n1gQ', // ✅ sakuralivecams
   desc:'JR 삿포로역 · 적설 · 날씨'},
  {id:'h2',r:'hokkaido',
   name:'홋카이도 라이브',loc:'홋카이도',
   vid:'kfIQBC0hrII', // 👤
   desc:'北海道 실시간 뷰'},
];

const REGIONS=[
  {id:'seoul',   label:'🇰🇷 서울',    sub:'Seoul, South Korea'},
  {id:'shibuya', label:'🗼 시부야',    sub:'Shibuya, Tokyo'},
  {id:'tokyo',   label:'🏙️ 도쿄',    sub:'Tokyo, Japan'},
  {id:'hokkaido',label:'⛄ 홋카이도', sub:'Hokkaido, Japan'},
];

// ── 편집 오버레이 ────────────────────────────────────
function openEdit(camId){
  document.getElementById('eo-'+camId)?.classList.add('show');
  const inp=document.getElementById('ei-'+camId);
  const cam=CAMS.find(c=>c.id===camId);
  if(inp&&cam){inp.value='https://www.youtube.com/watch?v='+cam.vid;inp.select();}
}
function closeEdit(camId){
  document.getElementById('eo-'+camId)?.classList.remove('show');
}
function applyEdit(camId){
  let val=(document.getElementById('ei-'+camId)?.value||'').trim();
  const m=val.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  if(m)val=m[1];
  if(!/^[A-Za-z0-9_-]{11}$/.test(val)){alert('올바른 YouTube Video ID가 아닙니다');return;}
  const cam=CAMS.find(c=>c.id===camId);
  if(cam)cam.vid=val;
  closeEdit(camId);
  // iframe 교체
  const frame=document.getElementById('frame-'+camId);
  if(frame){
    frame.classList.remove('loaded');
    const iframe=frame.querySelector('iframe');
    if(iframe)iframe.src=`https://www.youtube.com/embed/${val}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1`;
  }
}

// ── 렌더 ─────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  REGIONS.forEach(reg=>{
    const cams=CAMS.filter(c=>c.r===reg.id);
    const sec=document.createElement('div');
    sec.className='rblock show';
    sec.id='b-'+reg.id;
    sec.innerHTML=`
      <div class="bhead">
        <span class="btitle">${reg.label}</span>
        <span class="bsub">${reg.sub}</span>
      </div>
      <div class="cgrid">
        ${cams.map(cam=>`
          <div class="card" id="card-${cam.id}">
            <div class="ctop">
              <div class="ctop-left">
                <div class="cname">${cam.name}</div>
                <div class="cloc">${cam.loc}</div>
              </div>
              <div class="ctop-right">
                <button class="edit-btn" onclick="openEdit('${cam.id}')" title="영상 URL 변경">✎ URL</button>
                <div class="lstatus"><div class="ld2"></div>LIVE</div>
              </div>
            </div>
            <div class="frame" id="frame-${cam.id}">
              <div class="shimmer"></div>
              <iframe
                src="https://www.youtube.com/embed/${cam.vid}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen
                onload="document.getElementById('frame-${cam.id}').classList.add('loaded')"
              ></iframe>
              <div class="edit-overlay" id="eo-${cam.id}">
                <label>YouTube URL 또는 Video ID 붙여넣기<br><span style="color:#444;font-size:9px">예: youtube.com/watch?v=XXXXXXXXXXX</span></label>
                <input id="ei-${cam.id}" type="text" placeholder="URL 또는 11자리 ID"
                  onkeydown="if(event.key==='Enter')applyEdit('${cam.id}');if(event.key==='Escape')closeEdit('${cam.id}')">
                <div class="edit-btns">
                  <button class="btn-ok" onclick="applyEdit('${cam.id}')">적용</button>
                  <button class="btn-cx" onclick="closeEdit('${cam.id}')">취소</button>
                </div>
              </div>
            </div>
            <div class="cfoot">
              <span class="cfoot-txt">${cam.desc}</span>
              <button class="fav-btn" data-camid="${cam.id}"
                onclick="window.toggleFav(event,'${cam.id}','${cam.name}')">☆</button>
            </div>
          </div>
        `).join('')}
      </div>`;
    grid.appendChild(sec);
  });
}

// ── 탭 ───────────────────────────────────────────────
document.querySelectorAll('.rbtn').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');
    const r=this.dataset.r;
    REGIONS.forEach(reg=>{
      const el=document.getElementById('b-'+reg.id);if(!el)return;
      (r==='all'||r===reg.id)?el.classList.add('show'):el.classList.remove('show');
    });
  });
});

// ── 시계 ─────────────────────────────────────────────
function tick(){
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=`KST ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick();setInterval(tick,1000);

renderGrid();
</script>
</body>
</html>
